name: Provision microservice

# Runs on the canonical template repository.
# Dispatches init-from-template to a newly created service repository.

on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: Target repository (owner/repo), e.g. myorg/order-mservice
        required: true
      go_version:
        description: Go version for the new service
        required: true
        default: '1.25.10'
      service_slug:
        description: HTTP route prefix (optional, auto-derived if empty)
        required: false
      db_name:
        description: MySQL database name (optional, auto-derived if empty)
        required: false

jobs:
  dispatch:
    runs-on: ubuntu-latest
    if: github.repository == 'lianjin/go-mservice-template'
    steps:
      - name: Parse target repository
        id: target
        env:
          TARGET_REPO: ${{ inputs.target_repo }}
        run: |
          set -euo pipefail
          owner="${TARGET_REPO%%/*}"
          repo="${TARGET_REPO#*/}"
          echo "owner=${owner}" >> "$GITHUB_OUTPUT"
          echo "repo=${repo}" >> "$GITHUB_OUTPUT"

      - name: Dispatch init to target repository
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.REPO_DISPATCH_TOKEN }}
          repository: ${{ inputs.target_repo }}
          event-type: init-from-template
          client-payload: |-
            {
              "org": "${{ steps.target.outputs.owner }}",
              "repo": "${{ steps.target.outputs.repo }}",
              "go_version": "${{ inputs.go_version }}",
              "service_slug": "${{ inputs.service_slug }}",
              "db_name": "${{ inputs.db_name }}"
            }
