name: Build and Deploy

on:
  push:
    branches:
      - develop
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment target
        required: true
        default: dev
        type: choice
        options:
          - dev
          - prod

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      gitops_branch: ${{ steps.version.outputs.gitops_branch }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set version tag
        id: version
        run: |
          TIMESTAMP="$(date -u +%Y%m%d%H%M)"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ENV="${{ github.event.inputs.environment }}"
          elif [ "${{ github.ref_name }}" = "main" ]; then
            ENV="prod"
          else
            ENV="dev"
          fi
          if [ "${ENV}" = "prod" ]; then
            TAG="prod-${TIMESTAMP}"
            GITOPS_BRANCH="main"
          else
            TAG="dev-${TIMESTAMP}"
            GITOPS_BRANCH="develop"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "gitops_branch=${GITOPS_BRANCH}" >> "$GITHUB_OUTPUT"
          echo "Version tag: ${TAG}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Alibaba Cloud ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: |
            ${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_REPOSITORY }}:${{ steps.version.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create and push git tag
        run: |
          git config user.name "${GIT_USER_NAME:-github-actions[bot]}"
          git config user.email "${GIT_USER_EMAIL:-41898282+github-actions[bot]@users.noreply.github.com}"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Build summary
        run: |
          echo "### Build Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Git tag**: \`${{ steps.version.outputs.tag }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Image**: \`${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_REPOSITORY }}:${{ steps.version.outputs.tag }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **GitOps branch**: \`${{ steps.version.outputs.gitops_branch }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Commit**: \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gitops repo
        uses: actions/checkout@v4
        with:
          repository: nusiss-capstone-project/campaign-gitops
          token: ${{ secrets.GITOPS_TOKEN }}
          ref: ${{ needs.build.outputs.gitops_branch }}
          path: gitops

      - name: Update image tag
        working-directory: gitops
        run: |
          TAG="${{ needs.build.outputs.tag }}"
          VALUES_FILE="apps/task-mservice/values.yaml"
          sed -i "s/^  tag: .*/  tag: ${TAG}/" "${VALUES_FILE}"
          echo "Updated ${VALUES_FILE}:"
          grep -A2 '^image:' "${VALUES_FILE}"

      - name: Commit and push
        working-directory: gitops
        run: |
          git config user.name "${GIT_USER_NAME:-github-actions[bot]}"
          git config user.email "${GIT_USER_EMAIL:-41898282+github-actions[bot]@users.noreply.github.com}"
          git add apps/task-mservice/values.yaml
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore(task-mservice): bump image tag to ${{ needs.build.outputs.tag }}"
          git push origin "${{ needs.build.outputs.gitops_branch }}"

      - name: Deploy summary
        run: |
          echo "### Deploy Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Branch**: \`${{ needs.build.outputs.gitops_branch }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Image tag**: \`${{ needs.build.outputs.tag }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **File**: \`apps/task-mservice/values.yaml\`" >> "$GITHUB_STEP_SUMMARY"
