name: Trivy

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  trivy:
    name: Go & Trivy (server)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
      - name: Test server
        working-directory: server
        run: go test ./...
      - name: Compile client and common
        run: |
          (cd client && go build ./...)
          (cd common && go build ./...)
      - name: Trivy filesystem scan (server)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: server
          severity: CRITICAL,HIGH
          exit-code: 1
