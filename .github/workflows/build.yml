# Go version: server/go.mod (replaced by init-from-template). Do not add __GO_VERSION__ here.
name: build and test

on:
  push:
    branches:
      - '**'
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache: true

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@v1.13.0

      - name: Build and test modules
        run: |
          set -e
          for module in common client server; do
            echo ""
            echo "=============================="
            echo " Module: $module"
            echo "=============================="
            cd "$module"
            go build ./...
            gotestsum --format github-actions --format-icons text \
              --post-run-command "bash ${GITHUB_WORKSPACE}/scripts/gotest-summary.sh" \
              -- -json ./...
            cd ..
          done

  lint:
    name: Lint (multi-module)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: [common, client, server]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache: true
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9
        with:
          working-directory: ${{ matrix.module }}
          args: --timeout=5m
