syntax = "proto3";

package taskpb;

option go_package = "/taskpb;taskpb";

service TaskService {
  rpc SayHello (HelloRequest) returns (HelloResponse);
  rpc EnrollTask (EnrollTaskRequest) returns (EnrollTaskResponse);
}

message HelloRequest {
  string name = 1;
}

message HelloResponse {
  string message = 1;
}

message EnrollTaskRequest {
  int64 user_id = 1;
  int64 task_id = 2;
}

message EnrollTaskResponse {
  int64 task_execution_progress_id = 1;
  repeated int64 task_condition_execution_progress_ids = 2;
}
